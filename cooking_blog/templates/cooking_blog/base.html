<!DOCTYPE html>
{% load static %}
<html lang="ru" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ACooking — Эко-рецепты{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column h-100">

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold text-success" href="{% url 'home' %}">ACooking</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item">
                            <a class="nav-link btn btn-success border-0 px-3 me-lg-2 text-dark" href="{% url 'home' %}">Главная</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-success border-0 px-3 me-lg-2 text-dark" href="{% url 'categories' %}">Категории</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-success px-4 text-dark" href="#">Войти</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-shrink-0">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white border-top border-secondary mt-auto">
        <div class="container py-3">
            <div class="row align-items-center">
                <div class="col-md-4 text-center text-md-start mb-2 mb-md-0">
                    <span class="navbar-brand fw-bold text-success h2 mb-0">ACooking</span>
                </div>
                <div class="col-md-4 text-center mb-2 mb-md-0">
                    <p class="mb-0 fs-6 text-secondary">&copy; 2026 ACooking — A. Kuzeleva</p>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <a href="https://t.me/nerfeedmod" 
                       class="btn btn-outline-success rounded-circle d-inline-flex align-items-center justify-content-center p-0"
                       style="width: 50px; height: 50px;">
                        <i class="bi bi-telegram fs-2"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
