version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data/
    env_file:
      - .env  # Читаем переменные отсюда
    environment:
      # Маппинг переменных Django на переменные Postgres
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"

volumes:
  pg_data: